<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dark Echo | Horror Shorts</title>
<meta name="description" content="Best horror shorts and creepy stories">

<link rel="icon" href="Dark Echo s.png">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#070707;
color:white;
}

.container{
width:min(1400px,92%);
margin:auto;
}

header{
background:#000;
position:sticky;
top:0;
z-index:10;
}

nav{
display:flex;
justify-content:space-between;
padding:15px 0;
}

.logo{
color:#e50914;
font-size:26px;
font-weight:900;
}

.hero{
height:90vh;
display:flex;
align-items:center;
background:linear-gradient(to right,#000000ee,#00000088),url("Dark Echo.png") center/cover;
}

.hero-content{
max-width:600px;
}

h1{
font-size:70px;
margin-bottom:10px;
}

.btn{
background:#e50914;
padding:14px 22px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
}

section{
padding:60px 0;
}

.section-title{
font-size:28px;
font-weight:800;
margin-bottom:20px;
}

/* GRID */

.videos-grid{
display:flex;
gap:16px;
overflow-x:auto;
padding-bottom:20px;
}

/* CARD */

.card{
min-width:280px;
height:250px;
background:#111;
border-radius:12px;
overflow:hidden;
display:flex;
flex-direction:column;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

/* THUMB */

.thumb{
height:150px;
position:relative;
overflow:hidden;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.play{
position:absolute;
inset:0;
display:grid;
place-items:center;
font-size:40px;
opacity:0;
transition:.3s;
}

.card:hover .play{
opacity:1;
}

/* CONTENT */

.card-content{
padding:12px;
height:100px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.mini-btn{
background:#222;
padding:8px 14px;
border-radius:999px;
text-decoration:none;
color:white;
font-size:13px;
}

.big-video{
position:relative;
padding-top:56%;
}

.big-video iframe{
position:absolute;
width:100%;
height:100%;
}

footer{
text-align:center;
padding:30px;
color:#777;
}

</style>
</head>

<body>

<header>
<div class="container">
<nav>
<div class="logo">DARK ECHO</div>
</nav>
</div>
</header>

<section class="hero">
<div class="container">
<div class="hero-content">
<h1>Enter if you dare.</h1>
<a class="btn" href="https://www.youtube.com/@DarkEchoProject">Watch Channel</a>
</div>
</div>
</section>

<section>
<div class="container">
<h2 class="section-title">🔥 Latest Horror</h2>
<div class="big-video">
<iframe src="https://www.youtube.com/embed/XLxOJPfpdwo?mute=1" allowfullscreen></iframe>
</div>
</div>
</section>

<section>
<div class="container">
<h2 class="section-title">Latest Shorts</h2>

<div class="videos-grid">

<div class="card">
<div class="thumb">
<img src="top.png">
<div class="play">▶</div>
</div>
<div class="card-content">
<div>Top 10 Horror</div>
<a class="mini-btn" href="https://youtu.be/-LZY6crClR0">Watch</a>
</div>
</div>

<div class="card">
<div class="thumb">
<img src="reflection.jpg">
<div class="play">▶</div>
</div>
<div class="card-content">
<div>Reflection Smiled</div>
<a class="mini-btn" href="https://youtu.be/XLxOJPfpdwo">Watch</a>
</div>
</div>

</div>

</div>
</section>

<footer>
© 2026 Dark Echo
</footer>

</body>
</html>
